<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZPU</title>
    <link rel="icon" href="/LZPU.png" type="image/jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .title {
            text-align: center;
            margin: 20px 0;
            font-size: 2.2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .controls-container {
            flex: 1;
            min-width: 400px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .result-container {
            flex: 1;
            min-width: 400px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        h2 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 1.5rem;
        }
        
        .api-key-section input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        .api-key-section input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .upload-area p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .upload-area span {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        #image-upload {
            display: none;
        }
        
        #thumbnails-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        #prompt-input {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            resize: vertical;
        }
        
        #prompt-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        #generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff8c00, #ff0080);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        #generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-text {
            display: block;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .spinner.hidden {
            display: none;
        }
        
        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        #result-image-container {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        #result-image-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            display: none;
        }
        
        #result-image-container p {
            text-align: center;
            opacity: 0.7;
        }
        
        /* 历史记录区域 */
        .history-container {
            max-width: 1400px;
            margin: 40px auto 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .history-controls button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
        }
        
        .history-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .history-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .history-thumbnail {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .history-info {
            padding: 12px;
        }
        
        .history-prompt {
            font-size: 0.9rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-date {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: rgba(30, 30, 40, 0.95);
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 60vh;
            margin-bottom: 20px;
            border-radius: 8px;
            align-self: center;
        }
        
        .modal-prompt {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .empty-history {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }
        
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            
            .controls-container, .result-container {
                min-width: 100%;
            }
            
            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">🇨🇳柳州职业技术大学 AI商业应用模型测试版V0.9</h1>
    <p class="subtitle">(AI数字创意与传播中心与广西心象映画文化发展有限公司共同研发)</p>
    
    <div class="main-container">
        <div class="controls-container">
            <div class="api-key-section">
                <h2>设置</h2>
                <input type="password" id="api-key-input" placeholder="输入你的 OpenRouter API 密钥 (必填)">
            </div>
            <div class="upload-section">
                <h2>1. 上传图片</h2>
                <div class="upload-area">
                    <input type="file" id="image-upload" accept="image/*" multiple>
                    <label for="image-upload">
                        <p>点击或拖拽上传</p>
                        <span>支持多张图片</span>
                    </label>
                </div>
                <div id="thumbnails-container"></div>
            </div>

            <div class="prompt-section">
                <h2>2. 输入提示词</h2>
                <textarea id="prompt-input" placeholder="例如：一只穿着超级英雄斗篷的猫，电影级灯光"></textarea>
            </div>

            <button id="generate-btn">
                <span class="btn-text">生成</span>
                <span class="spinner hidden"></span>
            </button>
        </div>

        <div class="result-container">
            <h2>生成结果</h2>
            <div id="result-image-container">
                <p>生成的图片将显示在这里</p>
            </div>
        </div>
    </div>
    
    <!-- 新增的历史记录区域 -->
    <div class="history-container">
        <div class="history-header">
            <h2>历史生成结果</h2>
            <div class="history-controls">
                <button id="clear-history">清除历史</button>
            </div>
        </div>
        <div class="history-grid" id="history-grid">
            <div class="empty-history">暂无历史记录，生成图片后将显示在这里</div>
        </div>
    </div>
    
    <!-- 图片查看模态框 -->
    <div class="modal" id="image-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">历史生成详情</div>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <img class="modal-image" id="modal-image" src="" alt="历史图片">
                <div class="modal-prompt" id="modal-prompt"></div>
            </div>
        </div>
    </div>

    <script>
        // 模拟生成函数 - 实际项目中应替换为真实的API调用
        function generateImage(apiKey, prompt, images) {
            return new Promise((resolve) => {
                // 模拟API调用延迟
                setTimeout(() => {
                    // 创建一个虚拟的图片URL
                    const imageUrl = `https://picsum.photos/600/400?random=${Math.floor(Math.random() * 1000)}`;
                    resolve({
                        imageUrl: imageUrl,
                        prompt: prompt
                    });
                }, 2000);
            });
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            const apiKeyInput = document.getElementById('api-key-input');
            const imageUpload = document.getElementById('image-upload');
            const thumbnailsContainer = document.getElementById('thumbnails-container');
            const promptInput = document.getElementById('prompt-input');
            const generateBtn = document.getElementById('generate-btn');
            const resultImageContainer = document.getElementById('result-image-container');
            const historyGrid = document.getElementById('history-grid');
            const clearHistoryBtn = document.getElementById('clear-history');
            const imageModal = document.getElementById('image-modal');
            const modalImage = document.getElementById('modal-image');
            const modalPrompt = document.getElementById('modal-prompt');
            const closeModal = document.querySelector('.close-modal');
            
            let uploadedImages = [];
            let history = JSON.parse(localStorage.getItem('aiHistory')) || [];
            
            // 初始化历史记录显示
            renderHistory();
            
            // 图片上传处理
            imageUpload.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                uploadedImages = [];
                thumbnailsContainer.innerHTML = '';
                
                files.forEach(file => {
                    if (file.type.match('image.*')) {
                        const reader = new FileReader();
                        
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.classList.add('thumbnail');
                            thumbnailsContainer.appendChild(img);
                            
                            uploadedImages.push(e.target.result);
                        };
                        
                        reader.readAsDataURL(file);
                    }
                });
            });
            
            // 生成按钮点击事件
            generateBtn.addEventListener('click', async function() {
                const apiKey = apiKeyInput.value.trim();
                const prompt = promptInput.value.trim();
                
                if (!apiKey) {
                    alert('请输入API密钥');
                    return;
                }
                
                if (!prompt) {
                    alert('请输入提示词');
                    return;
                }
                
                // 显示加载状态
                generateBtn.querySelector('.btn-text').classList.add('hidden');
                generateBtn.querySelector('.spinner').classList.remove('hidden');
                generateBtn.disabled = true;
                
                try {
                    // 调用生成函数
                    const result = await generateImage(apiKey, prompt, uploadedImages);
                    
                    // 显示结果
                    resultImageContainer.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = result.imageUrl;
                    img.alt = '生成结果';
                    resultImageContainer.appendChild(img);
                    
                    // 保存到历史记录
                    const historyItem = {
                        id: Date.now(),
                        imageUrl: result.imageUrl,
                        prompt: prompt,
                        date: new Date().toLocaleString()
                    };
                    
                    history.unshift(historyItem);
                    localStorage.setItem('aiHistory', JSON.stringify(history));
                    
                    // 更新历史记录显示
                    renderHistory();
                } catch (error) {
                    console.error('生成失败:', error);
                    alert('生成失败，请重试');
                } finally {
                    // 恢复按钮状态
                    generateBtn.querySelector('.btn-text').classList.remove('hidden');
                    generateBtn.querySelector('.spinner').classList.add('hidden');
                    generateBtn.disabled = false;
                }
            });
            
            // 清除历史记录
            clearHistoryBtn.addEventListener('click', function() {
                if (confirm('确定要清除所有历史记录吗？')) {
                    history = [];
                    localStorage.removeItem('aiHistory');
                    renderHistory();
                }
            });
            
            // 关闭模态框
            closeModal.addEventListener('click', function() {
                imageModal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            imageModal.addEventListener('click', function(e) {
                if (e.target === imageModal) {
                    imageModal.style.display = 'none';
                }
            });
            
            // 渲染历史记录
            function renderHistory() {
                historyGrid.innerHTML = '';
                
                if (history.length === 0) {
                    historyGrid.innerHTML = '<div class="empty-history">暂无历史记录，生成图片后将显示在这里</div>';
                    return;
                }
                
                history.forEach(item => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';
                    historyItem.dataset.id = item.id;
                    
                    historyItem.innerHTML = `
                        <img class="history-thumbnail" src="${item.imageUrl}" alt="历史图片">
                        <div class="history-info">
                            <div class="history-prompt" title="${item.prompt}">${item.prompt}</div>
                            <div class="history-date">${item.date}</div>
                        </div>
                    `;
                    
                    historyItem.addEventListener('click', function() {
                        openHistoryItem(item);
                    });
                    
                    historyGrid.appendChild(historyItem);
                });
            }
            
            // 打开历史记录详情
            function openHistoryItem(item) {
                modalImage.src = item.imageUrl;
                modalPrompt.textContent = item.prompt;
                imageModal.style.display = 'flex';
            }
            
            // 拖拽上传功能
            const uploadArea = document.querySelector('.upload-area');
            
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#ff8c00';
                this.style.backgroundColor = 'rgba(255, 140, 0, 0.1)';
            });
            
            uploadArea.addEventListener('dragleave', function() {
                this.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                this.style.backgroundColor = '';
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                this.style.backgroundColor = '';
                
                const files = Array.from(e.dataTransfer.files);
                handleFiles(files);
            });
            
            function handleFiles(files) {
                uploadedImages = [];
                thumbnailsContainer.innerHTML = '';
                
                files.forEach(file => {
                    if (file.type.match('image.*')) {
                        const reader = new FileReader();
                        
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.classList.add('thumbnail');
                            thumbnailsContainer.appendChild(img);
                            
                            uploadedImages.push(e.target.result);
                        };
                        
                        reader.readAsDataURL(file);
                    }
                });
            }
        });
    </script>
</body>
</html>
